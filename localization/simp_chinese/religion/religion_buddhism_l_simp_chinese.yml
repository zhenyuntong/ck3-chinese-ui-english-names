 dhyana:0 "Dhyana"
 dhyana_adj:0 "Dhyana"
 dhyana_adherent:0 "Dhyanist"
 dhyana_adherent_plural:0 "Dhyanists"
 dhyana_desc:0 "Dhyana Buddhism strongly emphasizes deep and profound meditation as the only viable path to enlightenment — one can achieve true understanding only through inward reflection and contemplation, and not through the study of scriptures."
 vinaya:0 "Vinaya"
 vinaya_adj:0 "Vinaya"
 vinaya_adherent:0 "Vinayist"
 vinaya_adherent_plural:0 "Vinayists"
 vinaya_desc:0 "Adherents of Vinaya Buddhism hold themselves and each other to rigorous moral and ethical standards, for self-discipline is the foundation necessary for the pursuit of profound wisdom."
 pundarika:0 "Pundarika"
 pundarika_adj:0 "Pundarika"
 pundarika_adherent:0 "Pundarikist"
 pundarika_adherent_plural:0 "Pundarikists"
 pundarika_desc:0 "The Lotus Sutra is revered and venerated before all others in Pundarika Buddhism, which emphasizes mantras and complex rituals and originated in a mixture of tantric and esoteric elements transmitted to China along the Silk Road."
 sukhavati:0 "Sukhavati"
 sukhavati_adj:0 "Sukhavati"
 sukhavati_adherent:0 "Sukhavatist"
 sukhavati_adherent_plural:0 "Sukhavatists"
 sukhavati_desc:0 "Sukhavati, or Pure Land Buddhism, teaches that traditional routes to enlightenment are no longer possible. However, by invoking the compassion of Amitābha by reciting his name, one may be reborn in his Pure Land after death, whether monk or layman."
 yogacara:0 "Yogacara"
 yogacara_adj:0 "Yogacara"
 yogacara_adherent:0 "Yogacarist"
 yogacara_adherent_plural:0 "Yogacarists"
 yogacara_desc:0 "Yogocara Buddhists question that which others simply take for granted throughout their lives, treating the material world as nothing more than a manifestation of their own consciousnesses."
 avatamsaka:0 "Avatamsaka"
 avatamsaka_adj:0 "Avatamsaka"
 avatamsaka_adherent:0 "Avatamsakist"
 avatamsaka_adherent_plural:0 "Avatamsakists"
 avatamsaka_desc:0 "Avatamsaka Buddhists regard the Flower Garland Sutra as the supreme source of truth, which speaks of an infinity of worlds, of entire universes contained within a single mote of dust."
 mantrayana:0 "Mantrayana"
 mantrayana_adj:0 "Mantrayana"
 mantrayana_adherent:0 "Mantrayanan"
 mantrayana_adherent_plural:0 "Mantrayanans"
 mantrayana_desc:0 "Mantrayanan Buddhists augment their understanding of the profound and accelerate their spiritual journey with an array of esoteric rituals and mystical implements."
 maitreya:0 "Maitreya"
 maitreya_adj:0 "Maitreya"
 maitreya_adherent:0 "Maitreyanist"
 maitreya_adherent_plural:0 "Maitreyanists"
 maitreya_desc:0 "The age of Sakyamuni Buddha is over and Maitreya Buddha has descended to the world, or so believe those who exalt and embrace Maitreya as their prophesied savior. It is only through the destruction of the old order that the world can be saved."
 maitreya_religious_head_title:0 "Hierarch"
 maitreya_religious_head_title_name:0 "Religious Orders"
 acharya:0 "Acharya"
 acharya_adj:0 "Acharya"
 acharya_adherent:0 "Acharyist"
 acharya_adherent_plural:0 "Acharyists"
 acharya_desc:0 "Acharya, a derivative of Vajrayana Buddhism, crystallized in the ninth century with the intermingling and integration of Chinese rites and Tibetan tantric practices, resulting in a uniquely regionalized manifestation of Buddhism practices and worship."
