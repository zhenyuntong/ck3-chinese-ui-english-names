 GLOSS_NEMBUTSU:0 "Reciting the name of Amitābha is an ancient Buddhist mindfulness practice that found great interest in the East Asian schools. Known as Nianfo in China, or Nembutsu in Japan, the practice is considered by some schools to directly invoke the mercy of Amitābha, by whose grace one may be granted entry to the Pure Land, whether monk or layman."
