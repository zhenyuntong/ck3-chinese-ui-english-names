 pulugaism_desc:0 "$pulugaism_adherent_plural$ believe that the world was forged by the lizard god $pulugaism_high_god_name$, before he grew frustrated with humanity and struck it with a great flood. Only two men and two women survived, and $pulugaism_high_god_name$ helped them to recreate the world, humanity rediscovering fire and $pulugaism_high_god_name$ recreating all natural things. Followers maintain a complex, often combative, relationship with $pulugaism_high_god_name$. Acts which spark $pulugaism_high_god_name_possessive$ wrath spawn natural disasters, but can be subverted with proper sacrifice."
