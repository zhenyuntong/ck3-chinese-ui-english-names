 biliku_religion_desc:0 "This is the belief in a pantheon of Gods who hold a complex relationship with humanity. Many Nakkavara stories involve great ancestors engaging in combat with the chief deities of their faith. Some people personify the chief deity as a female spider Goddess, while others as a male lizard God. In all versions of the stories, the creator cast a firebrand at the great ancestor who stole fire and then disappeared from the material world, weary of humanity. The creator left behind their sons who took the form of wind to bring both reward and punishment to humans."
