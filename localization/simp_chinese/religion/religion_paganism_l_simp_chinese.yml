 basque_pagan_old_adherent_plural:0 "Old $basque_pagan_adherent_plural$"
 basque_high_god_name:0 "Mari"
 ## The euphemistic nickname "Red Skirt", with red being a color frequently ascribed to magical creatures and items in certain versions of Basque mythology.
 basque_high_god_name_2:0 "Ionagorri"
 basque_high_god_name_possessive:0 "Mari's"
 basque_high_god_name_alternate:0 "$basque_high_god_name$"
